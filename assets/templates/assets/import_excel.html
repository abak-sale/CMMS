<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Import Aset CMMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="dismiss" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Import Data Aset dari Excel</h4>
                    </div>
                    <div class="card-body">
                        <p class="text-muted">Gunakan fitur ini untuk mengunggah master data aset secara massal.</p>
                        
                        <form method="post" enctype="multipart/form-data" class="mt-4">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">{{ form.excel_file.label }}</label>
                                <input type="file" name="excel_file" class="form-control" required>
                                <div class="form-text">{{ form.excel_file.help_text }}</div>
                            </div>
                            
                            <div class="d-flex justify-content-between mt-4">
                                <a href="{% url 'assets:asset_list' %}" class="btn btn-secondary">Kembali ke Daftar Aset</a>
                                <button type="submit" class="btn btn-success">Mulai Import Data</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
